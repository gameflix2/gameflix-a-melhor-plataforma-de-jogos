<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameflix - Jogos Originais com até 90% OFF</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
    :root {
        --netflix-red: #E50914;
        --netflix-red-hover: #f40612;
        --netflix-black: #141414;
        --netflix-dark: #000000;
        --netflix-gray: #181818;
        --netflix-text: #e5e5e5;
        --netflix-text-muted: #808080;
    }

    * {
        scroll-behavior: smooth;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--netflix-black);
        color: var(--netflix-text);
        overflow-x: hidden;
    }

    h1, h2, h3,.font-gamer {
        font-family: 'Bebas Neue', sans-serif;
        letter-spacing: 1px;
        line-height: 1.1;
    }

   .logo-text {
        font-family: 'Bebas Neue', sans-serif;
        color: var(--netflix-red);
        letter-spacing: 2px;
    }

    /* Hero Netflix + Mobile */
   .netflix-hero {
        background: linear-gradient(77deg, rgba(0,0,0,.9) 0, rgba(0,0,0,.6) 50%, transparent 100%),
                    linear-gradient(to top, var(--netflix-black) 0, transparent 40%);
    }

    @media (max-width: 768px) {
       .netflix-hero {
            background: linear-gradient(0deg, var(--netflix-black) 0%, rgba(0,0,0,.8) 30%, transparent 100%);
        }
    }

    /* Card Netflix Responsivo */
   .netflix-card {
        background: #181818;
        border-radius: 4px;
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    @media (hover: hover) {
       .netflix-card:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
       .netflix-card:hover img {
            transform: scale(1.1);
        }
    }

    /* Touch no mobile */
    @media (hover: none) {
       .netflix-card:active {
            transform: scale(0.98);
        }
    }

   .netflix-card img {
        transition: all 0.3s ease;
        width: 100%;
        height: auto;
    }

    /* Botões Netflix Mobile */
   .btn-netflix {
        background: var(--netflix-red);
        color: white;
        font-weight: 600;
        transition: all 0.2s ease;
        border: none;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

   .btn-netflix:hover,.btn-netflix:active {
        background: var(--netflix-red-hover);
    }

   .btn-netflix-secondary {
        background: rgba(109, 109, 110, 0.7);
        color: white;
        font-weight: 600;
        transition: all 0.2s ease;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

   .btn-netflix-secondary:hover,.btn-netflix-secondary:active {
        background: rgba(109, 109, 110, 0.4);
    }

    /* Header Netflix Mobile */
   .netflix-header {
        background: linear-gradient(180deg, rgba(0,0,0,.7) 10%, transparent);
        transition: background 0.3s ease;
    }

   .netflix-header.scrolled {
        background: var(--netflix-black);
    }

    /* Menu Mobile */
   .mobile-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 75%;
        max-width: 320px;
        height: 100vh;
        background: var(--netflix-black);
        transition: right 0.3s ease;
        z-index: 9999;
        padding: 80px 24px 24px;
    }

   .mobile-menu.active {
        right: 0;
        box-shadow: -10px 0 30px rgba(0,0,0,0.8);
    }

   .mobile-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 9998;
    }

   .mobile-overlay.active {
        opacity: 1;
        pointer-events: all;
    }

    /* Badge Netflix */
   .netflix-badge {
        background: var(--netflix-red);
        color: white;
        font-weight: 700;
        font-size: 0.7rem;
        padding: 3px 8px;
        border-radius: 2px;
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 10;
    }

    @media (max-width: 640px) {
       .netflix-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
        }
    }

    /* Section Title Responsivo */
   .netflix-section-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.75rem;
        font-weight: 400;
        letter-spacing: 1px;
        margin-bottom: 1rem;
    }

    @media (min-width: 640px) {
       .netflix-section-title {
            font-size: 2.25rem;
        }
    }

    @media (min-width: 1024px) {
       .netflix-section-title {
            font-size: 2.75rem;
        }
    }

    /* Glass vira card Netflix */
   .glass,.gradient-border {
        background: #181818;
        border: 1px solid #2F2F2F;
    }

   .gradient-border::before {
        display: none;
    }

    /* Texto Netflix */
   .gradient-text {
        color: var(--netflix-red);
        background: none;
        -webkit-text-fill-color: var(--netflix-red);
    }

    /* Remove glow */
   .glow-green,.glow-purple {
        box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    /* Fade in */
   .fade-in {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease, transform 0.6s ease;
    }

   .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* FAQ */
   .faq-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
    }

   .faq-item.active.faq-content {
        max-height: 500px;
    }

   .faq-item.active.fa-chevron-down {
        transform: rotate(180deg);
    }

    /* Grid responsivo Netflix */
   .netflix-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
    }

    @media (min-width: 640px) {
       .netflix-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
    }

    @media (min-width: 768px) {
       .netflix-grid {
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
    }

    @media (min-width: 1024px) {
       .netflix-grid {
            grid-template-columns: repeat(5, 1fr);
        }
    }

    @media (min-width: 1280px) {
       .netflix-grid {
            grid-template-columns: repeat(6, 1fr);
        }
    }

    /* Preço Netflix */
   .netflix-price {
        font-size: 1.5rem;
        font-weight: 800;
        color: white;
    }

    @media (min-width: 640px) {
       .netflix-price {
            font-size: 2rem;
        }
    }

   .netflix-price-old {
        text-decoration: line-through;
        color: var(--netflix-text-muted);
        font-size: 0.875rem;
    }

   .netflix-discount {
        background: var(--netflix-red);
        color: white;
        padding: 2px 6px;
        border-radius: 2px;
        font-size: 0.75rem;
        font-weight: 700;
    }

    /* Remove grid bg */
   .grid-bg {
        background: none;
    }
</style>
</head>
<body class="antialiased">

<!-- Header Netflix com Menu Mobile -->
<header class="fixed top-0 w-full z-50 netflix-header" id="mainHeader">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-14 sm:h-16 md:h-20">
            <div class="flex items-center gap-2">
                <i class="fas fa-gamepad text-xl sm:text-2xl md:text-3xl" style="color: #E50914;"></i>
                <span class="text-xl sm:text-2xl md:text-3xl logo-text">GAMEFLIX</span>
            </div>

            <!-- Menu Desktop -->
            <nav class="hidden md:flex items-center gap-8">
                <a href="#ofertas" class="text-sm font-semibold hover:text-gray-300 transition-colors">Ofertas</a>
                <a href="#beneficios" class="text-sm font-semibold hover:text-gray-300 transition-colors">Benefícios</a>
                <a href="#faq" class="text-sm font-semibold hover:text-gray-300 transition-colors">FAQ</a>
            </nav>

            <!-- Botão Desktop + Hamburguer Mobile -->
            <div class="flex items-center gap-3">
                <a href="#oferta-destaque" class="hidden sm:block btn-netflix px-4 sm:px-6 py-2 sm:py-2.5 rounded text-xs sm:text-sm md:text-base">
                    COMPRAR
                </a>
                <button id="menuToggle" class="md:hidden text-2xl text-white">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Menu Mobile Overlay -->
<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
    <button id="menuClose" class="absolute top-6 right-6 text-2xl">
        <i class="fas fa-times"></i>
    </button>
    <nav class="flex flex-col gap-6">
        <a href="#ofertas" class="text-lg font-semibold hover:text-gray-300 transition-colors mobile-link">Ofertas</a>
        <a href="#beneficios" class="text-lg font-semibold hover:text-gray-300 transition-colors mobile-link">Benefícios</a>
        <a href="#faq" class="text-lg font-semibold hover:text-gray-300 transition-colors mobile-link">FAQ</a>
        <a href="#oferta-destaque" class="btn-netflix px-6 py-3 rounded text-base mt-4 mobile-link">
            COMPRAR AGORA
        </a>
    </nav>
</div>

<!-- Hero Mobile First -->
<section class="relative min-h- sm:min-h-screen flex items-end sm:items-center justify-start pt-14 netflix-hero">
    <img src="https://images.unsplash.com/photo-1614464841842-d0ce643b34ea?w=1920&h=1080&fit=crop" alt="Hero" class="absolute inset-0 w-full h-full object-cover -z-10">

    <div class="relative w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-8 sm:py-20">
        <div class="max-w-2xl">
            <div class="inline-block mb-3 sm:mb-4 px-2 sm:px-3 py-1 rounded" style="background: var(--netflix-red);">
                <span class="text- sm:text-xs font-bold">+5.000 GAMERS JÁ ECONOMIZARAM</span>
            </div>

            <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl xl:text-8xl font-black mb-3 sm:mb-4 leading-none fade-in">
                PARE DE PAGAR<br>
                R$299 EM JOGOS
            </h1>

            <p class="text-sm sm:text-base md:text-lg lg:text-xl text-gray-300 mb-6 sm:mb-8 max-w-xl fade-in">
                Jogos 100% originais com <span style="color: var(--netflix-red); font-weight: 700;">até 90% OFF</span> e entrega em <span class="font-bold">24h</span>
            </p>

            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 fade-in">
                <a href="#ofertas" class="btn-netflix px-6 sm:px-8 py-3 sm:py-3 rounded text-sm sm:text-base lg:text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-play"></i> VER OFERTAS
                </a>
                <a href="#beneficios" class="btn-netflix-secondary px-6 sm:px-8 py-3 sm:py-3 rounded text-sm sm:text-base lg:text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-info-circle"></i> MAIS INFO
                </a>
            </div>
        </div>
    </div>
</section>

<!--
Para as outras seções, use essas classes:

1. Grid de jogos: class="netflix-grid"
2. Card de jogo: class="netflix-card"
3. Badge desconto: class="netflix-badge"
4. Preço: class="netflix-price" + class="netflix-price-old"
5. Título seção: class="netflix-section-title"
6. Botão: class="btn-netflix"

Exemplo de card responsivo:
<div class="netflix-card">
    <div class="relative">
        <span class="netflix-badge">84% OFF</span>
        <img src="..." alt="Jogo" class="aspect-[2/3]">
    </div>
    <div class="p-2 sm:p-3">
        <h3 class="font-bold text-sm sm:text-base mb-1">Nome do Jogo</h3>
        <div class="flex items-center gap-2">
            <span class="netflix-price">R$ 49</span>
            <span class="netflix-price-old">R$ 299</span>
        </div>
    </div>
</div>
-->

<script>
    // Header scroll
    window.addEventListener('scroll', () => {
        const header = document.getElementById('mainHeader');
        if (window.scrollY > 50) {
            header.classList.add('scrolled');
        } else {
            header.classList.remove('scrolled');
        }
    });

    // Menu Mobile
    const menuToggle = document.getElementById('menuToggle');
    const menuClose = document.getElementById('menuClose');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const mobileLinks = document.querySelectorAll('.mobile-link');

    function openMenu() {
        mobileMenu.classList.add('active');
        mobileOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
        mobileMenu.classList.remove('active');
        mobileOverlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    menuToggle.addEventListener('click', openMenu);
    menuClose.addEventListener('click', closeMenu);
    mobileOverlay.addEventListener('click', closeMenu);
    mobileLinks.forEach(link => link.addEventListener('click', closeMenu));

    // Fade in on scroll
    const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, observerOptions);

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // FAQ Accordion
    document.querySelectorAll('.faq-toggle').forEach(button => {
        button.addEventListener('click', () => {
            const faqItem = button.parentElement;
            const wasActive = faqItem.classList.contains('active');

            document.querySelectorAll('.faq-item').forEach(item => {
                item.classList.remove('active');
            });

            if (!wasActive) {
                faqItem.classList.add('active');
            }
        });
    });

    // Smooth scroll
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                const headerOffset = 70;
                const elementPosition = target.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });
            }
        });
    });
</script>

</body>
</html>
