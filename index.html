<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassino Neon PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:radial-gradient(circle at top,#0f0f1f,#050509);
  color:#fff;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,255,255,0.2);
}

.logo{
  font-size:22px;
  color:#0ff;
  text-shadow:0 0 15px #0ff;
}

#saldo{
  margin-right:15px;
  color:#0f0;
}

button{
  background:linear-gradient(45deg,#0ff,#00f);
  border:none;
  padding:10px 15px;
  border-radius:10px;
  color:#000;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 10px #0ff;
  transition:.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #0ff;
}

.container{padding:20px}
.hidden{display:none}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:25px;
  margin:15px 0;
  box-shadow:0 0 20px rgba(0,255,255,0.2);
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 30px #0ff;
}

input, select{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

.slot{
  font-size:40px;
  letter-spacing:10px;
  margin:20px 0;
  text-align:center;
}

.roleta-wheel{
  width:200px;
  height:200px;
  border-radius:50%;
  border:5px solid #0ff;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  box-shadow:0 0 20px #0ff;
}

.card-area{
  display:flex;
  gap:10px;
  font-size:30px;
}

</style>
</head>
<body>

<header>
<div class="logo">⚡ CASSINO PRO ⚡</div>
<div>
<span id="saldo"></span>
<button onclick="logout()">Sair</button>
</div>
</header>

<div class="container" id="auth">
<h2>Login / Cadastro</h2>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Cadastrar</button>
</div>

<div class="container hidden" id="dashboard">
<h2>🎮 Cassino</h2>
<div class="card" onclick="abrir('tigrinho')">🐅 Tigrinho PRO</div>
<div class="card" onclick="abrir('roleta')">🎡 Roleta 3D</div>
<div class="card" onclick="abrir('blackjack')">🃏 Blackjack Real</div>
<div class="card" onclick="abrir('bicho')">🐾 Jogo do Bicho</div>
</div>

<div class="container hidden" id="tigrinho">
<h2>Tigrinho</h2>
<div class="slot" id="slot">🍒 🍋 🍊</div>
<input id="betT" placeholder="Aposta">
<button onclick="girar()">Girar</button>
<button onclick="voltar()">Voltar</button>
</div>

<div class="container hidden" id="roleta">
<h2>Roleta</h2>
<div class="roleta-wheel" id="wheel">🎡</div>
<input id="betR" placeholder="Valor">
<button onclick="apostarRoleta('vermelho')">Vermelho</button>
<button onclick="apostarRoleta('preto')">Preto</button>
<button onclick="voltar()">Voltar</button>
</div>

<div class="container hidden" id="blackjack">
<h2>Blackjack</h2>
<div class="card-area" id="bj"></div>
<button onclick="jogarBJ()">Jogar</button>
<button onclick="voltar()">Voltar</button>
</div>

<div class="container hidden" id="bicho">
<h2>Jogo do Bicho</h2>
<select id="animal">
<option>gato</option>
<option>cachorro</option>
<option>leao</option>
<option>tigre</option>
<option>elefante</option>
</select>
<input id="betB" placeholder="Valor">
<button onclick="apostarBicho()">Apostar</button>
<button onclick="voltar()">Voltar</button>
</div>

<script>
let user=null

function salvar(){localStorage.setItem('user',JSON.stringify(user))}
function carregar(){let u=localStorage.getItem('user');if(u){user=JSON.parse(u);showDash()}}

function register(){
user={email:email.value,senha:senha.value,saldo:1000}
salvar();alert('Conta criada!')
}

function login(){
let u=JSON.parse(localStorage.getItem('user'))
if(u && u.email===email.value && u.senha===senha.value){user=u;showDash()} else alert('Erro')
}

function showDash(){
auth.classList.add('hidden')
dashboard.classList.remove('hidden')
atualizarSaldo()
}

function logout(){localStorage.removeItem('user');location.reload()}

function atualizarSaldo(){saldo.innerText='💰 R$ '+user.saldo}

function abrir(j){dashboard.classList.add('hidden');document.getElementById(j).classList.remove('hidden')}
function voltar(){document.querySelectorAll('.container').forEach(c=>c.classList.add('hidden'));dashboard.classList.remove('hidden')}

// Tigrinho animado
function girar(){
let bet=parseInt(betT.value)
if(user.saldo<bet)return alert('Sem saldo')
let items=['🍒','🍋','🍊','⭐','💎']
let i=0
let interval=setInterval(()=>{
slot.innerText=[items[rand()],items[rand()],items[rand()]].join(' ')
i++
if(i>10){clearInterval(interval)
let r=slot.innerText.split(' ')
if(r[0]===r[1] && r[1]===r[2]){user.saldo+=bet*5;alert('🔥 JACKPOT')} else user.saldo-=bet
salvar();atualizarSaldo()}
},100)
}
function rand(){return Math.floor(Math.random()*5)}

// Roleta animada
function apostarRoleta(cor){
let bet=parseInt(betR.value)
wheel.style.transform='rotate('+Math.random()*2000+'deg)'
setTimeout(()=>{
let resultado=Math.random()>0.5?'vermelho':'preto'
if(cor===resultado){user.saldo+=bet}else user.saldo-=bet
alert('Saiu '+resultado)
salvar();atualizarSaldo()
},1000)
}

// Blackjack visual
function jogarBJ(){
let cartas=['A','K','Q','J','10','9','8']
let p=cartas[rand()]
let d=cartas[rand()]
bj.innerHTML='🧑 '+p+' vs 🎩 '+d
if(rand()>2)user.saldo+=50 else user.saldo-=50
salvar();atualizarSaldo()
}

// Bicho
function apostarBicho(){
let bet=parseInt(betB.value)
let animais=['gato','cachorro','leao','tigre','elefante']
let sorteio=animais[rand()]
if(animal.value===sorteio){user.saldo+=bet*10}else user.saldo-=bet
alert('Saiu '+sorteio)
salvar();atualizarSaldo()
}

carregar()
</script>

</body>
</html>
